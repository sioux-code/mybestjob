<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBestJob — Emplois autour de Provins</title>
  <meta name="description" content="Offres d'emploi dans un rayon de 45 min autour de Provins, triées par compatibilité.">
  <meta name="theme-color" content="#1E3A5F">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <!--
    Police Lexend : conçue pour améliorer la lisibilité, aide les personnes dyslexiques.
    Poids 400 (normal) et 600 (semi-gras) uniquement.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Lien d'évitement pour clavier / lecteurs d'écran -->
  <a class="skip-link" href="#resultats">Aller aux résultats</a>

  <header role="banner">
    <div class="header-title">
      <span class="logo" aria-hidden="true">J</span>
      <div>
        <h1>MyBest<strong>Job</strong></h1>
        <p class="subtitle">Emplois · 45 min autour de Provins</p>
      </div>
    </div>
    <button id="install-btn" class="btn-install" hidden aria-label="Installer l'application sur cet appareil">
      Installer
    </button>
  </header>

  <!-- ── Filtres ── -->
  <section class="filters" aria-label="Filtres de recherche">

    <div class="filter-group">
      <span class="filter-label" id="label-compat">Compatibilité</span>
      <div class="pill-group" role="radiogroup" aria-labelledby="label-compat">
        <button class="pill"        data-score="0"  role="radio" aria-checked="false">Tout</button>
        <button class="pill"        data-score="6"  role="radio" aria-checked="false">Compatible</button>
        <button class="pill active" data-score="8"  role="radio" aria-checked="true">Très compatible</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="filtre-contrat">Contrat</label>
      <select id="filtre-contrat">
        <option value="">Tous</option>
        <option value="CDI">CDI</option>
        <option value="CDD">CDD</option>
        <option value="Intérim">Intérim</option>
        <option value="Alternance">Alternance</option>
      </select>
    </div>

  </section>

  <!-- ── Barre d'info ── -->
  <div class="info-bar" role="status" aria-live="polite">
    <span id="compteur"></span>
    <span id="derniere-maj"></span>
  </div>

  <!-- ── Résultats ── -->
  <main id="resultats" role="main">

<ul id="liste-offres" role="list" aria-label="Liste des offres d'emploi"></ul>

    <p id="vide" class="etat-vide" hidden role="status">
      Aucune offre ne correspond à ces critères.
    </p>

    <div id="erreurs" class="etat-erreur" hidden role="alert"></div>

  </main>

  <!-- ── Bouton actualiser ── -->
  <button class="fab" id="btn-actualiser" aria-label="Actualiser les offres" title="Actualiser">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M23 4v6h-6M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0114.13-3.36L23 10M1 14l5.36 4.36A9 9 0 0020.49 15"/>
    </svg>
  </button>

  <script src="/app.js"></script>
</body>
</html>
