<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBestJob — Emplois autour de Provins</title>
  <meta name="description" content="Offres d'emploi dans un rayon de 45 min autour de Provins, triées par compatibilité.">
  <meta name="theme-color" content="#ffffff">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <a class="skip-link" href="#resultats">Aller aux résultats</a>

  <header role="banner">
    <div class="header-inner">
      <div class="header-title">
        <span class="logo" aria-hidden="true">J</span>
        <div>
          <h1>MyBest<strong>Job</strong></h1>
          <p class="subtitle">45 min autour de Provins</p>
        </div>
      </div>
      <button id="install-btn" class="btn-install" hidden aria-label="Installer l'application sur cet appareil">
        Installer
      </button>
    </div>
  </header>

  <!-- ── Profils d'accessibilité ── -->
  <nav class="profiles-bar" aria-label="Profil d'accessibilité">
    <span class="filter-label" id="label-profil">Profil</span>
    <div class="pill-group" role="radiogroup" aria-labelledby="label-profil">
      <button class="pill pill--profile active" data-profil="standard"  role="radio" aria-checked="true">Standard</button>
      <button class="pill pill--profile"        data-profil="autisme"   role="radio" aria-checked="false">Autisme · Asperger</button>
      <button class="pill pill--profile"        data-profil="malvoyant" role="radio" aria-checked="false">Malvoyant</button>
      <button class="pill pill--profile"        data-profil="dyslexie"  role="radio" aria-checked="false">Dyslexie+</button>
    </div>
  </nav>

  <!-- ── Filtres ── -->
  <section class="filters" aria-label="Filtres de recherche">

    <div class="filter-group">
      <span class="filter-label" id="label-compat">Compatibilité</span>
      <div class="pill-group" role="radiogroup" aria-labelledby="label-compat">
        <button class="pill"        data-filter="score" data-score="0"  role="radio" aria-checked="false">Tout</button>
        <button class="pill"        data-filter="score" data-score="6"  role="radio" aria-checked="false">Compatible</button>
        <button class="pill active" data-filter="score" data-score="8"  role="radio" aria-checked="true">Très compatible</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="filtre-contrat">Contrat</label>
      <select id="filtre-contrat">
        <option value="">Tous</option>
        <option value="CDI">CDI</option>
        <option value="CDD">CDD</option>
        <option value="Intérim">Intérim</option>
        <option value="Alternance">Alternance</option>
        <option value="Stage">Stage</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="filtre-source">Source</label>
      <select id="filtre-source">
        <option value="">Toutes</option>
        <option value="France Travail">France Travail</option>
        <option value="CH Provins">CH Provins</option>
      </select>
    </div>

    <div class="filter-group filter-group--toggle">
      <span class="filter-label" id="label-th">Handicap</span>
      <label class="toggle-switch" for="filtre-th">
        <input type="checkbox" id="filtre-th" role="switch" aria-checked="false" aria-labelledby="label-th">
        <span class="toggle-track" aria-hidden="true"></span>
        <span class="toggle-label-text">Offres TH uniquement</span>
      </label>
    </div>

    <div class="filter-group filter-group--geo">
      <span class="filter-label" id="label-geo">Distance depuis moi</span>
      <div class="geo-controls">
        <button class="btn-geo" id="btn-geo" aria-label="Détecter ma position">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="7" stroke-dasharray="2 2"/></svg>
          <span id="geo-label">Me localiser</span>
        </button>
        <div class="geo-slider-wrap" id="geo-slider-wrap" hidden>
          <input type="range" id="filtre-distance" min="5" max="100" step="5" value="50"
                 aria-labelledby="label-geo" aria-valuetext="50 km">
          <span id="distance-val">50 km</span>
        </div>
      </div>
    </div>

  </section>

  <!-- ── Barre d'info ── -->
  <div class="info-bar" role="status" aria-live="polite">
    <span id="compteur"></span>
    <span id="derniere-maj"></span>
  </div>

  <!-- ── Résultats ── -->
  <main id="resultats" role="main">

    <ul id="liste-offres" role="list" aria-label="Liste des offres d'emploi"></ul>

    <p id="vide" class="etat-vide" hidden role="status">
      Aucune offre ne correspond à ces critères.
    </p>

    <div id="erreurs" class="etat-erreur" hidden role="alert"></div>

  </main>

  <!-- ── Bouton actualiser ── -->
  <button class="fab" id="btn-actualiser" aria-label="Actualiser les offres" title="Actualiser">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M23 4v6h-6M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0114.13-3.36L23 10M1 14l5.36 4.36A9 9 0 0020.49 15"/>
    </svg>
  </button>

  <script src="/app.js"></script>
</body>
</html>
