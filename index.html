<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBestJob — Emplois autour de Provins</title>
  <meta name="description" content="Offres d'emploi dans un rayon de 45 min autour de Provins, triées par compatibilité.">
  <meta name="theme-color" content="#ffffff">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <a class="skip-link" href="#resultats">Aller aux résultats</a>

  <header role="banner">
    <div class="header-inner">
      <div class="header-title">
        <span class="logo" aria-hidden="true">J</span>
        <div>
          <h1>MyBest<strong>Job</strong></h1>
          <p class="subtitle">Emplois autour de Provins</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="btn-mon-profil" class="btn-profil-header" aria-haspopup="dialog" aria-label="Configurer mon profil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <span id="btn-profil-label">Mon profil</span>
        </button>
        <button id="install-btn" class="btn-install" hidden aria-label="Installer l'application sur cet appareil">
          Installer
        </button>
      </div>
    </div>
  </header>

  <!-- ── Modal Mon profil ── -->
  <div id="modal-profil" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-titre">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-titre">Mon profil</h2>
        <button class="modal-close" id="modal-close" aria-label="Fermer">&times;</button>
      </div>
      <div class="modal-body">

        <div class="profil-field">
          <label class="profil-label" for="p-formation">Niveau de formation</label>
          <select id="p-formation">
            <option value="aucun">Sans diplôme</option>
            <option value="cap">CAP / BEP</option>
            <option value="bac">Bac</option>
            <option value="bac2">Bac+2</option>
            <option value="bac3">Bac+3 et plus</option>
          </select>
        </div>

        <div class="profil-field">
          <label class="profil-label" for="p-experience">Expérience professionnelle</label>
          <select id="p-experience">
            <option value="debutant">Débutante / peu d'expérience</option>
            <option value="junior">1 à 3 ans</option>
            <option value="confirme">3 à 10 ans</option>
            <option value="senior">Plus de 10 ans</option>
          </select>
        </div>

        <div class="profil-field">
          <label class="profil-label" for="p-age">Tranche d'âge</label>
          <select id="p-age">
            <option value="tout">Non précisé</option>
            <option value="moins30">Moins de 30 ans</option>
            <option value="30-49">30 – 49 ans</option>
            <option value="50plus">50 ans et plus</option>
          </select>
        </div>

        <div class="profil-field">
          <span class="profil-label">Situations particulières</span>
          <div class="profil-checks">
            <label class="profil-check">
              <input type="checkbox" id="p-rqth"> RQTH / Travailleur handicapé
            </label>
            <label class="profil-check">
              <input type="checkbox" id="p-permis"> Permis B
            </label>
          </div>
        </div>

        <div class="profil-field">
          <label class="profil-label" for="p-mots">Mots-clés métiers qui m'intéressent</label>
          <input type="text" id="p-mots" placeholder="ex: comptabilité, saisie, logistique…" autocomplete="off">
          <p class="profil-hint">Séparez par des virgules</p>
        </div>

        <div class="profil-field">
          <label class="profil-label" for="p-exclus">Mots-clés à exclure</label>
          <input type="text" id="p-exclus" placeholder="ex: commercial, manager, accueil…" autocomplete="off">
          <p class="profil-hint">Séparez par des virgules</p>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn-sauver" id="btn-sauver-profil">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- ── Filtres ── -->
  <section class="filters" aria-label="Filtres de recherche">

<div class="filter-group">
      <label class="filter-label" for="filtre-contrat">Contrat</label>
      <select id="filtre-contrat">
        <option value="">Tous</option>
        <option value="CDI">CDI</option>
        <option value="CDD">CDD</option>
        <option value="Intérim">Intérim</option>
        <option value="Alternance">Alternance</option>
        <option value="Stage">Stage</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="filtre-source">Source</label>
      <select id="filtre-source">
        <option value="">Toutes</option>
        <option value="France Travail">France Travail</option>
        <option value="CH Provins">CH Provins</option>
      </select>
    </div>

    <div class="filter-group filter-group--toggle">
      <span class="filter-label" id="label-profil-filtre">Mon profil</span>
      <label class="toggle-switch" for="filtre-profil">
        <input type="checkbox" id="filtre-profil" role="switch" aria-checked="false" aria-labelledby="label-profil-filtre">
        <span class="toggle-track" aria-hidden="true"></span>
        <span class="toggle-label-text">Pour moi uniquement</span>
      </label>
    </div>

    <div class="filter-group filter-group--toggle">
      <span class="filter-label" id="label-th">RQTH</span>
      <label class="toggle-switch" for="filtre-th">
        <input type="checkbox" id="filtre-th" role="switch" aria-checked="false" aria-labelledby="label-th">
        <span class="toggle-track" aria-hidden="true"></span>
        <span class="toggle-label-text">Employeurs ouverts RQTH</span>
      </label>
    </div>

    <div class="filter-group filter-group--geo">
      <span class="filter-label" id="label-geo">Distance depuis moi</span>
      <div class="geo-controls">
        <button class="btn-geo" id="btn-geo" aria-label="Détecter ma position">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="7" stroke-dasharray="2 2"/></svg>
          <span id="geo-label">Me localiser</span>
        </button>
        <div class="geo-slider-wrap" id="geo-slider-wrap" hidden>
          <input type="range" id="filtre-distance" min="5" max="100" step="5" value="50"
                 aria-labelledby="label-geo" aria-valuetext="50 km">
          <span id="distance-val">50 km</span>
        </div>
      </div>
    </div>

  </section>

  <!-- ── Barre d'info ── -->
  <div class="info-bar" role="status" aria-live="polite">
    <span id="compteur"></span>
    <div class="info-bar-right">
      <span id="derniere-maj"></span>
      <button id="btn-reset-filtres" class="btn-reset" aria-label="Réinitialiser les filtres">&#8635; Réinitialiser</button>
    </div>
  </div>

  <!-- ── Résultats ── -->
  <main id="resultats" role="main">

    <ul id="liste-offres" role="list" aria-label="Liste des offres d'emploi"></ul>

    <p id="vide" class="etat-vide" hidden role="status">
      Aucune offre ne correspond à ces critères.
    </p>

    <div id="erreurs" class="etat-erreur" hidden role="alert"></div>

  </main>

  <!-- ── Bouton actualiser ── -->
  <button class="fab" id="btn-actualiser" aria-label="Actualiser les offres" title="Actualiser">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M23 4v6h-6M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0114.13-3.36L23 10M1 14l5.36 4.36A9 9 0 0020.49 15"/>
    </svg>
  </button>

  <script src="/app.js"></script>
</body>
</html>
